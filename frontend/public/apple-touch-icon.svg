<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="90" cy="90" r="85" fill="#030712"/>
  <circle cx="90" cy="90" r="85" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Starburst rays -->
  <g opacity="0.35">
    <line x1="90" y1="15" x2="90" y2="35" stroke="url(#mainGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="90" y1="145" x2="90" y2="165" stroke="url(#mainGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="90" x2="35" y2="90" stroke="url(#mainGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="145" y1="90" x2="165" y2="90" stroke="url(#mainGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="47" y2="47" stroke="url(#mainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="133" y1="133" x2="148" y2="148" stroke="url(#mainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="148" y1="32" x2="133" y2="47" stroke="url(#mainGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="47" y1="133" x2="32" y2="148" stroke="url(#mainGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Main V shape -->
  <path d="M35 42 L90 152 L145 42 L128 42 L90 96 L52 42 Z" fill="url(#vFill180)" stroke="url(#mainGrad)" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Inner star -->
  <path d="M90 70 L102 97 L130 97 L108 112 L116 138 L90 122 L64 138 L72 112 L50 97 L78 97 Z" fill="url(#innerStar)" opacity="0.85"/>

  <!-- Center glow -->
  <circle cx="90" cy="96" r="20" fill="url(#centerGlow180)"/>

  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4485ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4485ff"/>
      <stop offset="100%" stop-color="#6e35eb"/>
    </linearGradient>
    <linearGradient id="vFill180" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4485ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6e35eb" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="innerStar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#4485ff"/>
    </linearGradient>
    <radialGradient id="centerGlow180" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
