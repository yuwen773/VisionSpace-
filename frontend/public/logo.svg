<svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Starburst background -->
  <g opacity="0.4">
    <line x1="70" y1="10" x2="70" y2="30" stroke="url(#stellarGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="70" y1="110" x2="70" y2="130" stroke="url(#stellarGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="70" x2="30" y2="70" stroke="url(#stellarGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="110" y1="70" x2="130" y2="70" stroke="url(#stellarGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="40" y2="40" stroke="url(#stellarGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="115" y2="115" stroke="url(#stellarGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="115" y1="25" x2="100" y2="40" stroke="url(#stellarGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="100" x2="25" y2="115" stroke="url(#stellarGrad)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Main V shape - stylized star -->
  <path d="M25 30 L70 110 L115 30 L95 30 L70 70 L45 30 Z" fill="url(#vFill)" stroke="url(#stellarGrad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner star accent -->
  <path d="M70 50 L78 70 L98 70 L82 82 L88 102 L70 90 L52 102 L58 82 L42 70 L62 70 Z" fill="url(#vFill2)" opacity="0.8"/>

  <!-- Center glow -->
  <circle cx="70" cy="70" r="15" fill="url(#centerGlow)"/>

  <defs>
    <linearGradient id="stellarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4485ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="vFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4485ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6e35eb" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="vFill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#4485ff"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
